<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <title>Kanji Master - Full Database</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
            --accent: #f43f5e; --success: #10b981; --error: #ef4444; --muted: #94a3b8;
            --n5: #3b82f6; --n4: #10b981; --n3: #f59e0b; --n2: #8b5cf6; --n1: #f43f5e;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 15px;
        }
        .container {
            background-color: var(--card); padding: 1.2rem; border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); width: 100%; max-width: 500px; text-align: center;
        }
        .level-bar { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .lvl-btn { 
            padding: 6px 12px; border-radius: 8px; border: 2px solid #334155; 
            background: transparent; color: white; cursor: pointer; font-size: 0.75rem; font-weight: bold; transition: 0.2s;
        }
        .lvl-btn.active[data-lvl="N5"] { background: var(--n5); border-color: var(--n5); }
        .lvl-btn.active[data-lvl="N4"] { background: var(--n4); border-color: var(--n4); }
        .lvl-btn.active[data-lvl="N3"] { background: var(--n3); border-color: var(--n3); }
        .lvl-btn.active[data-lvl="N2"] { background: var(--n2); border-color: var(--n2); }
        .lvl-btn.active[data-lvl="N1"] { background: var(--n1); border-color: var(--n1); }

        .kanji-card { font-size: 5rem; margin: 10px 0; min-height: 120px; display: flex; align-items: center; justify-content: center; }
        .info-box { color: var(--muted); font-size: 0.85rem; margin-bottom: 15px; height: 3.5rem; display: flex; flex-direction: column; justify-content: center; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt {
            background: #2d3748; border: 1px solid #3e4b5f; color: white; padding: 12px 5px; border-radius: 12px;
            cursor: pointer; font-size: 0.95rem; transition: 0.1s;
        }
        .opt:active { transform: scale(0.95); }
        
        #pool-display { color: var(--accent); font-weight: bold; }
        .stats-area { margin-top: 25px; border-top: 1px solid #334155; padding-top: 10px; text-align: left; }
        .err-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #2d3748; font-size: 0.8rem; }
        .badge { font-size: 0.6rem; padding: 1px 4px; border-radius: 3px; margin-left: 5px; color: white; font-weight: bold; }
    </style>
</head>

        </div>

        <div class="stats-area">

        </div>

        let stats = [];

        function initStats() {
            let saved = JSON.parse(localStorage.getItem('k_master_v6')) || [];
            stats = rawDB.map(k => {
                const s = saved.find(x => x.k === k.k);
                return s ? {...k, ok: s.ok, err: s.err} : {...k, ok: 0, err: 0};
            });
        }

        let currentPool = [], currentQ = null, streak = 0;

        function updatePool() {
            const activeLvls = Array.from(document.querySelectorAll('.lvl-btn.active')).map(b => b.dataset.lvl);
            
            // Calcul réel sur la base de données filtrée
            currentPool = stats.filter(s => activeLvls.includes(s.l));
            
            // AFFICHAGE DU POOL CORRIGÉ : On prend la longueur de currentPool
            document.getElementById('pool-display').innerText = currentPool.length;
            
            if(currentPool.length > 0) {
                next();
            } else {
                document.getElementById('main-q').innerText = "Ø";
                document.getElementById('opts').innerHTML = "";
            }
        }

        function next() {
            const mode = document.querySelector('input[name="m"]:checked').value;
            currentQ = currentPool[Math.floor(Math.random()*currentPool.length)];
            document.getElementById('msg').innerText = "";
            
            if(mode === 'k2f') {
                document.getElementById('main-q').innerText = currentQ.k;
                document.getElementById('extra-q').innerHTML = `ON: ${currentQ.on} | KUN: ${currentQ.kun}`;
            } else {
                document.getElementById('main-q').innerText = currentQ.fr;
                document.getElementById('extra-q').innerText = "Trouvez le Kanji";
            }

            // Génération d'options parmi TOUTE la base (pas juste le pool) pour plus de difficulté
            const randoms = stats.filter(x => x.k !== currentQ.k).sort(() => 0.5-Math.random()).slice(0,3);
            const choices = [...randoms, currentQ].sort(() => 0.5-Math.random());
            
            const grid = document.getElementById('opts');
            grid.innerHTML = "";
            choices.forEach(c => {
                const b = document.createElement('button');
                b.className = 'opt';
                b.innerText = (mode === 'k2f') ? c.fr : c.k;
                b.onclick = () => check(b, c, mode);
                grid.appendChild(b);
            });
        }

        function check(btn, selected, mode) {
            const correct = selected.k === currentQ.k;
            const target = (mode === 'k2f') ? currentQ.fr : currentQ.k;
            if(correct) {
                streak++; currentQ.ok++;
                btn.style.background = "var(--success)";
                setTimeout(updatePool, 400);
            } else {
                streak = 0; currentQ.err++;
                btn.style.background = "var(--error)";
                document.getElementById('msg').innerHTML = `<span style="color:var(--error)">Rép: ${target}</span>`;
                setTimeout(updatePool, 1600);
            }
            save();
        }

        function save() {
            localStorage.setItem('k_master_v6', JSON.stringify(stats));
            document.getElementById('streak').innerText = streak;
            const list = document.getElementById('stats-list');
            list.innerHTML = "";
            [...stats].filter(s => s.err > 0).sort((a,b) => b.err - a.err).slice(0, 5).forEach(s => {
                list.innerHTML += `<div class="err-row">
                    <span><b>${s.k}</b> <span class="badge" style="background:var(--${s.l.toLowerCase()})">${s.l}</span></span>
                    <span style="color:var(--error)">${s.err} ❌</span>
                </div>`;
            });
        }

        document.getElementById('lvl-selectors').addEventListener('click', e => {
            if(e.target.classList.contains('lvl-btn')) {
                e.target.classList.toggle('active');
                updatePool();
            }
        });

        document.querySelectorAll('input[name="m"]').forEach(r => r.onchange = updatePool);
        
        initStats();
        updatePool();
    </script>
