<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT Master - 150 Verbes</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
            --accent-jp: #f43f5e; --success: #10b981; --error: #ef4444; --muted: #94a3b8;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg); color: var(--text);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px;
        }
        .container {
            background-color: var(--card); padding: 1.5rem; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); width: 100%; max-width: 500px; text-align: center;
        }
        .config-panel {
            background: rgba(0,0,0,0.2); border-radius: 12px; padding: 15px; margin-bottom: 20px;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
        }
        .config-group { display: flex; align-items: center; gap: 5px; cursor: pointer; font-weight: bold;}
        .config-group input { cursor: pointer; accent-color: var(--accent-jp); width: 18px; height: 18px; }
        
        .header-tools { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 0.9rem;}
        .mode-toggle {
            background: #334155; border: 1px solid var(--muted); color: white;
            padding: 6px 12px; border-radius: 8px; cursor: pointer;
        }

        .verb-card { margin: 20px 0; min-height: 150px; display: flex; flex-direction: column; justify-content: center;}
        .main-word { font-size: 3.5rem; display: block; margin-bottom: 5px; color: #fff; }
        .sub-word { font-size: 1.2rem; color: var(--accent-jp); height: 1.5rem; font-weight: 500; }
        .level-badge { background: #475569; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; margin-left: 10px; vertical-align: middle;}

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-option {
            background: #334155; border: 2px solid transparent; color: white;
            padding: 15px 8px; border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 0.95rem;
        }
        .feedback { height: 24px; margin: 15px 0; font-weight: bold; font-size: 1.1rem; }

        .stats-container {
            width: 100%; max-width: 500px; background: var(--card);
            border-radius: 15px; padding: 1rem; margin-top: 20px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; color: var(--muted); padding: 8px; border-bottom: 1px solid #334155; }
        td { padding: 8px; border-bottom: 1px solid #1e293b; }
        .err-count { color: var(--error); font-weight: bold; }
        .back-btn { align-self: flex-start; margin-bottom: 15px; color: var(--text); text-decoration: none; background: var(--card); padding: 8px 15px; border-radius: 8px;}
    </style>
</head>
<body>

    <<a href="index.html" style="position: fixed; top: 10px; left: 10px; background: #1e293b; color: white; text-decoration: none; padding: 8px 15px; border-radius: 10px; font-size: 14px; border: 1px solid #334155; z-index: 1000;">
    🏠 Accueil
</a>

    <div class="container">
        <div class="config-panel">
            <label class="config-group"><input type="checkbox" class="lvl-check" value="N5" checked onchange="updateFilter()"> N5</label>
            <label class="config-group"><input type="checkbox" class="lvl-check" value="N4" checked onchange="updateFilter()"> N4</label>
            <label class="config-group"><input type="checkbox" class="lvl-check" value="N3" checked onchange="updateFilter()"> N3</label>
        </div>

        <div class="header-tools">
            <div>Score: <b id="score">0</b> | 🔥 <b id="streak">0</b></div>
            <button class="mode-toggle" onclick="toggleMode()" id="modeBtn">JP → FR</button>
        </div>

        <div class="verb-card">
            <span class="main-word" id="display-main">...</span>
            <div>
                <span class="sub-word" id="display-sub">...</span>
                <span id="display-level" class="level-badge">-</span>
            </div>
        </div>

        <div id="options-container" class="options-grid"></div>
        <div class="feedback" id="feedback"></div>
    </div>

    <div class="stats-container">
        <h3 style="margin: 0 0 10px 0; font-size: 1rem;">Top 5 erreurs (Focus)</h3>
        <table>
            <thead><tr><th>Verbe</th><th>Lvl</th><th>Fautes</th></tr></thead>
            <tbody id="stats-body"></tbody>
        </table>
    </div>

            {jp:"準備する", ro:"Junbi-suru", fr:"Préparer", lvl:"N4"}, {jp:"壊す", ro:"Kowasu", fr:"Casser", lvl:"N4"},

            {jp:"頑張る", ro:"Ganbaru", fr:"Faire de son mieux", lvl:"N4"}, {jp:"集める", ro:"Atsumeru", fr:"Collectionner", lvl:"N4"},
            {jp:"謝る", ro:"Ayamaru", fr:"S'excuser", lvl:"N4"}, {jp:"祈る", ro:"Inoru", fr:"Prier", lvl:"N4"},

            {jp:"驚く", ro:"Odoroku", fr:"Être surpris", lvl:"N4"}, {jp:"躍る", ro:"Odoru", fr:"Danser", lvl:"N4"},
            {jp:"比べる", ro:"Kuraberu", fr:"Comparer", lvl:"N4"}, {jp:"殺す", ro:"Korosu", fr:"Tuer", lvl:"N4"},
            {jp:"探す", ro:"Sagasu", fr:"Chercher", lvl:"N4"}, {jp:"下がる", ro:"Sagaru", fr:"Baisser", lvl:"N4"},
            {jp:"知らせる", ro:"Shiraseru", fr:"Informer", lvl:"N4"}, {jp:"尋ねる", ro:"Tazuneru", fr:"Demander", lvl:"N4"},
            {jp:"頼む", ro:"Tanomu", fr:"Demander un service", lvl:"N4"}, {jp:"捕まえる", ro:"Tsukamaeru", fr:"Attraper", lvl:"N4"},
            {jp:"疲れる", ro:"Tsukareru", fr:"Se fatiguer", lvl:"N4"}, {jp:"着く", ro:"Tsuku", fr:"Arriver", lvl:"N4"},
            {jp:"続ける", ro:"Tsuzukeru", fr:"Continuer", lvl:"N4"}, {jp:"並べる", ro:"Naraberu", fr:"Aligner", lvl:"N4"},
            {jp:"鳴る", ro:"Naru", fr:"Sonner", lvl:"N4"}, {jp:"盗む", ro:"Nusumu", fr:"Voler / Dérober", lvl:"N4"},
            {jp:"塗る", ro:"Nuru", fr:"Peindre / Tartiner", lvl:"N4"}, {jp:"濡れる", ro:"Nureru", fr:"Se mouiller", lvl:"N4"},
            {jp:"運ぶ", ro:"Hakobu", fr:"Transporter", lvl:"N4"}, {jp:"払う", ro:"Harau", fr:"Payer", lvl:"N4"},
            {jp:"冷やす", ro:"Hiyasu", fr:"Refroidir", lvl:"N4"}, {jp:"踏む", ro:"Fumu", fr:"Marcher sur", lvl:"N4"},
            {jp:"震える", ro:"Furueru", fr:"Trembler", lvl:"N4"}, {jp:"褒める", ro:"Homeru", fr:"Louer / Féliciter", lvl:"N4"},
            {jp:"負ける", ro:"Makeru", fr:"Perdre", lvl:"N4"}, {jp:"間違う", ro:"Machigau", fr:"Se tromper", lvl:"N4"},
            {jp:"投げる", ro:"Nageru", fr:"Lancer", lvl:"N4"}, {jp:"増える", ro:"Fueru", fr:"Augmenter", lvl:"N4"},
            {jp:"減る", ro:"Heru", fr:"Diminuer", lvl:"N4"}, {jp:"笑う", ro:"Warau", fr:"Rire", lvl:"N4"},

            // --- N3 (50 Verbes) ---
            {jp:"信じる", ro:"Shinjiru", fr:"Croire", lvl:"N3"}, {jp:"認める", ro:"Mitomeru", fr:"Admettre / Reconnaître", lvl:"N3"},
            {jp:"断る", ro:"Kotowaru", fr:"Refuser", lvl:"N3"}, {jp:"求める", ro:"Motomeru", fr:"Réclamer / Rechercher", lvl:"N3"},
            {jp:"奪う", ro:"Ubau", fr:"Voler / Saisir par force", lvl:"N3"}, {jp:"願う", ro:"Negau", fr:"Souhaiter / Prier", lvl:"N3"},
            {jp:"支える", ro:"Sazaeru", fr:"Soutenir", lvl:"N3"}, {jp:"伝える", ro:"Tsutaeru", fr:"Transmettre", lvl:"N3"},
            {jp:"守る", ro:"Mamoru", fr:"Protéger / Respecter", lvl:"N3"}, {jp:"避ける", ro:"Sakeru", fr:"Éviter", lvl:"N3"},
            {jp:"預ける", ro:"Azakeru", fr:"Confier / Déposer", lvl:"N3"}, {jp:"与える", ro:"Ataeru", fr:"Donner / Accorder", lvl:"N3"},
            {jp:"現れる", ro:"Arawareru", fr:"Apparaître", lvl:"N3"}, {jp:"合わせる", ro:"Awaseru", fr:"Joindre / Ajuster", lvl:"N3"},
            {jp:"抱く", ro:"Idaku", fr:"Embrasser / Porter", lvl:"N3"}, {jp:"祝う", ro:"Iwau", fr:"Célébrer", lvl:"N3"},
            {jp:"植える", ro:"Ueru", fr:"Planter", lvl:"N3"}, {jp:"浮く", ro:"Uku", fr:"Flotter", lvl:"N3"},
            {jp:"承る", ro:"Uketamawaru", fr:"Recevoir (poli)", lvl:"N3"}, {jp:"疑う", ro:"Utagau", fr:"Douter", lvl:"N3"},
            {jp:"打つ", ro:"Utsu", fr:"Frapper / Taper", lvl:"N3"}, {jp:"写す", ro:"Utsusu", fr:"Copier / Photographier", lvl:"N3"},
            {jp:"埋める", ro:"Umeru", fr:"Enterrer", lvl:"N3"}, {jp:"占う", ro:"Uranau", fr:"Prédire l'avenir", lvl:"N3"},
            {jp:"選ぶ", ro:"Erabu", fr:"Choisir", lvl:"N3"}, {jp:"得る", ro:"Eru", fr:"Obtenir / Gagner", lvl:"N3"},
            {jp:"追う", ro:"Ou", fr:"Poursuivre", lvl:"N3"}, {jp:"終える", ro:"Oeru", fr:"Terminer", lvl:"N3"},
            {jp:"拝む", ro:"Ogamu", fr:"Vénérer / Adorer", lvl:"N3"}, {jp:"補う", ro:"Oginau", fr:"Compléter / Compenser", lvl:"N3"},
            {jp:"贈る", ro:"Okuru", fr:"Offrir un cadeau", lvl:"N3"}, {jp:"怒る", ro:"Okoru", fr:"Se fâcher", lvl:"N3"},
            {jp:"抑える", ro:"Osaeru", fr:"Réprimer / Retenir", lvl:"N3"}, {jp:"恐れる", ro:"Osoreru", fr:"Craindre", lvl:"N3"},
            {jp:"教わる", ro:"Osowaru", fr:"Apprendre de qqun", lvl:"N3"}, {jp:"収める", ro:"Osameru", fr:"Stocker / Obtenir", lvl:"N3"},
            {jp:"重なる", ro:"Kasanaru", fr:"Se superposer", lvl:"N3"}, {jp:"飾る", ro:"Kazaru", fr:"Décorer", lvl:"N3"},
            {jp:"稼ぐ", ro:"Kasegu", fr:"Gagner de l'argent", lvl:"N3"}, {jp:"数える", ro:"Kazoeru", fr:"Compter", lvl:"N3"},
            {jp:"固まる", ro:"Katamaru", fr:"Se durcir", lvl:"N3"}, {jp:"担ぐ", ro:"Katsugu", fr:"Porter sur l'épaule", lvl:"N3"},
            {jp:"悲しむ", ro:"Kanashimu", fr:"Être triste", lvl:"N3"}, {jp:"通う", ro:"Kayou", fr:"Fréquenter (lieu)", lvl:"N3"},
            {jp:"枯れる", ro:"Kareru", fr:"Se flétrir", lvl:"N3"}, {jp:"可愛がる", ro:"Kawaigaru", fr:"Chérir", lvl:"N3"},
            {jp:"刻む", ro:"Kizamu", fr:"Hacher / Graver", lvl:"N3"}, {jp:"競う", ro:"Kisou", fr:"Rivaliser", lvl:"N3"},
            {jp:"嫌う", ro:"Kirau", fr:"Détester", lvl:"N3"}, {jp:"切れる", ro:"Kireru", fr:"Couper / Expirer", lvl:"N3"}
        ];

        let stats = JSON.parse(localStorage.getItem('jp_pro_stats_v3')) || 
                    verbData.map(v => ({...v, err: 0, ok: 0}));
        
        let filteredStats = [];
        let currentMode = 'jpToFr';
        let currentQ = null;
        let score = 0, streak = 0, lock = false;

        function updateFilter() {
            const checkedLevels = Array.from(document.querySelectorAll('.lvl-check:checked')).map(cb => cb.value);
            filteredStats = stats.filter(v => checkedLevels.includes(v.lvl));
            if(filteredStats.length === 0) {
                document.getElementById('display-main').innerText = "❌";
                document.getElementById('options-container').innerHTML = "Coche au moins un niveau !";
            } else {
                nextQuestion();
            }
        }

        function toggleMode() {
            currentMode = currentMode === 'jpToFr' ? 'frToJp' : 'jpToFr';
            document.getElementById('modeBtn').innerText = currentMode === 'jpToFr' ? 'JP → FR' : 'FR → JP';
            nextQuestion();
        }

        function nextQuestion() {
            if(filteredStats.length === 0) return;
            lock = false;
            document.getElementById('feedback').innerText = "";
            const pool = [];
            filteredStats.forEach((v, i) => {
                const weight = 1 + (v.err * 6); // Poids très fort sur les erreurs
                for(let j=0; j<weight; j++) pool.push(i);
            });
            currentQ = filteredStats[pool[Math.floor(Math.random() * pool.length)]];
            document.getElementById('display-main').innerText = currentMode === 'jpToFr' ? currentQ.jp : currentQ.fr;
            document.getElementById('display-sub').innerText = currentMode === 'jpToFr' ? currentQ.ro : "";
            document.getElementById('display-level').innerText = currentQ.lvl;
            renderOptions();
        }

        function renderOptions() {
            const correct = currentMode === 'jpToFr' ? currentQ.fr : currentQ.jp;
            let options = [correct];
            while(options.length < 4 && options.length < filteredStats.length) {
                let r = filteredStats[Math.floor(Math.random() * filteredStats.length)];
                let val = currentMode === 'jpToFr' ? r.fr : r.jp;
                if(!options.includes(val)) options.push(val);
            }
            options.sort(() => Math.random() - 0.5);
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn-option';
                btn.innerText = opt;
                btn.onclick = () => check(opt, btn);
                container.appendChild(btn);
            });
        }

        function check(selected, btn) {
            if(lock) return;
            lock = true;
            const correct = currentMode === 'jpToFr' ? currentQ.fr : currentQ.jp;
            const fb = document.getElementById('feedback');
            if(selected === correct) {
                score++; streak++; currentQ.ok++;
                btn.style.backgroundColor = "var(--success)";
                fb.innerText = "Correct ! ✨"; fb.style.color = "var(--success)";
                setTimeout(nextQuestion, 800);
            } else {
                streak = 0; currentQ.err++;
                btn.style.backgroundColor = "var(--error)";
                fb.innerText = `Faux : ${correct}`; fb.style.color = "var(--error)";
                document.querySelectorAll('.btn-option').forEach(b => {
                    if(b.innerText === correct) b.style.backgroundColor = "var(--success)";
                });
                setTimeout(nextQuestion, 2200);
            }
            save();
        }

        function save() {
            localStorage.setItem('jp_pro_stats_v3', JSON.stringify(stats));
            document.getElementById('score').innerText = score;
            document.getElementById('streak').innerText = streak;
            const tbody = document.getElementById('stats-body');
            tbody.innerHTML = '';
            [...stats].filter(v => v.err > 0).sort((a,b) => b.err - a.err).slice(0, 5).forEach(v => {
                tbody.innerHTML += `<tr><td>${v.jp}</td><td>${v.lvl}</td><td class="err-count">${v.err}</td></tr>`;
            });
        }
        updateFilter();
        save();
    </script>

</body>
</html>
