<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Português Master 🇧🇷</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --text-dim: #94a3b8;
            --pt-primary: #22c55e; --err: #ef4444; --ok: #10b981; --gold: #f59e0b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--text); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px;
        }
        .app-container { width: 100%; max-width: 500px; text-align: center; }
        .card { background: var(--card); padding: 2rem; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #334155; position: relative; margin-bottom: 20px; }
        .screen { display: none; } .active { display: block; }
        .streak-display { font-size: 1.2rem; font-weight: bold; color: var(--gold); margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        h1 { margin: 0 0 10px 0; font-size: 2.2rem; font-weight: 900; }
        select, input { width: 100%; padding: 16px; border-radius: 12px; border: 2px solid #334155; background: var(--bg); color: white; font-size: 16px; margin-bottom: 15px; outline: none; }
        .btn-primary { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--pt-primary); color: white; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .explanation-box { background: rgba(255,255,255,0.03); border-left: 4px solid var(--pt-primary); padding: 15px; border-radius: 8px; margin-top: 15px; text-align: left; font-size: 0.9rem; }
        .stats-card { background: rgba(30, 41, 59, 0.7); padding: 1.5rem; border-radius: 16px; border: 1px dashed #475569; margin-top: 20px; }
        .stats-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .stats-table th { color: var(--text-dim); text-align: left; padding-bottom: 10px; }
        .stats-table td { padding: 8px 0; border-bottom: 1px solid #334155; text-align: left; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="screen-setup" class="screen active">
            <div class="streak-display">🔥 <span id="streak-setup">0</span></div>
            <h1>Português Master 🇧🇷</h1>
            
            <div class="card">
                <label id="lbl-ui">Langue Interface:</label>
                <select id="ui-lang-select" onchange="changeUILanguage()">
                    <option value="fr">Français 🇫🇷</option>
                    <option value="en">English 🇬🇧</option>
                </select>

                <label id="lbl-tense">Tempo:</label>
                <select id="time-select">
                    <option value="Presente">Presente</option>
                    <option value="Futuro">Futuro do Presente</option>
                    <option value="Pretérito Perfeito">Pretérito Perfeito</option>
                    <option value="Pretérito Imperfeito">Pretérito Imperfeito</option>
                </select>

                <label style="display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:15px; color:var(--text-dim);">
                    <input type="checkbox" id="irr-toggle" style="width:auto; margin:0;"> <span id="lbl-irr">Inclure les irréguliers</span>
                </label>

                <button id="btn-start" class="btn-primary" onclick="startQuiz()">Vamos! 🚀</button>
            </div>

            <div class="stats-card">
                <h3 id="stats-title">Top 10 Erreurs</h3>
                <table class="stats-table">
                    <thead><tr><th id="th-verb">Verbe</th><th id="th-err">Erreurs</th></tr></thead>
                    <tbody id="stats-body"></tbody>
                </table>
            </div>
        </div>

        <div id="screen-quiz" class="screen">
            <div class="streak-display">🔥 <span id="streak-quiz">0</span></div>
            <h1 id="quiz-title">Prática 🇧🇷</h1>
            <div class="card">
                <div id="display-verb" style="font-size: 2.2rem; font-weight: 900; color: var(--pt-primary);">---</div>
                <div id="display-trans" style="font-style: italic; color: var(--text-dim); margin-bottom: 15px;">---</div>
                <div id="display-tense" style="text-transform:uppercase; font-size:0.8rem; color:var(--text-dim); margin-bottom:15px;">---</div>
                <div id="display-prompt" style="font-size:1.4rem; margin-bottom:20px;">---</div>
                <input type="text" id="user-input" autocomplete="off" autocorrect="off" spellcheck="false">
                <div id="feedback"></div>
                <div id="explanation"></div>
            </div>
            <button class="btn-primary" style="background:#475569" onclick="location.reload()">Menu</button>
        </div>
    </div>

<script>
    const uiStrings = {
        fr: {
            start: "Commencer 🚀", topErrors: "Top 10 Erreurs", practice: "Pratique 🇧🇷",
            placeholder: "Tapez la réponse...", correct: "Excellent !", incorrect: "Faux, recopiez :",
            lblUi: "Langue de l'interface :", lblTense: "Temps :", lblIrr: "Inclure les irréguliers",
            thVerb: "Verbe", thErr: "Erreurs"
        },
        en: {
            start: "Start 🚀", topErrors: "Top 10 Errors", practice: "Practice 🇧🇷",
            placeholder: "Type the answer...", correct: "Excellent!", incorrect: "Wrong, copy this:",
            lblUi: "Interface Language:", lblTense: "Tense:", lblIrr: "Include irregulars",
            thVerb: "Verb", thErr: "Errors"
        }
    };

    const endings = {
        "Presente": {
            "ar": ["o", "as", "a", "amos", "am", "am"],
            "er": ["o", "es", "e", "emos", "em", "em"],
            "ir": ["o", "es", "e", "imos", "em", "em"]
        },
        "Futuro": {
            "all": ["ei", "ás", "á", "emos", "ão", "ão"]
        },
        "Pretérito Perfeito": {
            "ar": ["ei", "aste", "ou", "amos", "aram", "aram"],
            "er": ["i", "este", "eu", "emos", "eram", "eram"],
            "ir": ["i", "iste", "iu", "imos", "iram", "iram"]
        },
        "Pretérito Imperfeito": {
            "ar": ["ava", "avas", "ava", "ávamos", "avam", "avam"],
            "er": ["ia", "ias", "ia", "íamos", "iam", "iam"],
            "ir": ["ia", "ias", "ia", "íamos", "iam", "iam"]
        }
    };

    const db = {
        people: ["Eu", "Tu", "Ele/Ela", "Nós", "Vocês", "Eles/Elas"],
        verbs: [
            // AR - Réguliers
            { pt: "Falar", fr: "Parler", en: "Speak", group: "ar" },
            { pt: "Gostar", fr: "Aimer (bien)", en: "Like", group: "ar" },
            { pt: "Trabalhar", fr: "Travailler", en: "Work", group: "ar" },
            { pt: "Estudar", fr: "Étudier", en: "Study", group: "ar" },
            { pt: "Comprar", fr: "Acheter", en: "Buy", group: "ar" },
            { pt: "Cantar", fr: "Chanter", en: "Sing", group: "ar" },
            { pt: "Dançar", fr: "Danser", en: "Dance", group: "ar" },
            { pt: "Andar", fr: "Marcher", en: "Walk", group: "ar" },
            { pt: "Ficar", fr: "Rester", en: "Stay", group: "ar" },
            { pt: "Lembrar", fr: "Se souvenir", en: "Remember", group: "ar" },
            { pt: "Esperar", fr: "Attendre/Espérer", en: "Wait", group: "ar" },
            { pt: "Achar", fr: "Trouver/Penser", en: "Find/Think", group: "ar" },
            { pt: "Levar", fr: "Emmener", en: "Take", group: "ar" },
            { pt: "Chegar", fr: "Arriver", en: "Arrive", group: "ar" },
            { pt: "Olhar", fr: "Regarder", en: "Look", group: "ar" },
            { pt: "Tirar", fr: "Retirer", en: "Take out", group: "ar" },
            
            // ER - Réguliers
            { pt: "Comer", fr: "Manger", en: "Eat", group: "er" },
            { pt: "Beber", fr: "Boire", en: "Drink", group: "er" },
            { pt: "Vender", fr: "Vendre", en: "Sell", group: "er" },
            { pt: "Correr", fr: "Courir", en: "Run", group: "er" },
            { pt: "Escrever", fr: "Écrire", en: "Write", group: "er" },
            { pt: "Aprender", fr: "Apprendre", en: "Learn", group: "er" },
            { pt: "Entender", fr: "Comprendre", en: "Understand", group: "er" },
            { pt: "Receber", fr: "Recevoir", en: "Receive", group: "er" },
            { pt: "Viver", fr: "Vivre", en: "Live", group: "er" },
            { pt: "Bater", fr: "Frapper", en: "Hit", group: "er" },
            
            // IR - Réguliers
            { pt: "Abrir", fr: "Ouvrir", en: "Open", group: "ir" },
            { pt: "Partir", fr: "Partir", en: "Leave", group: "ir" },
            { pt: "Assistir", fr: "Regarder (TV)", en: "Watch", group: "ir" },
            { pt: "Dividir", fr: "Diviser", en: "Divide", group: "ir" },
            { pt: "Decidir", fr: "Décider", en: "Decide", group: "ir" },
            { pt: "Subir", fr: "Monter", en: "Go up", group: "ir" },
            { pt: "Desistir", fr: "Abandonner", en: "Give up", group: "ir" },
            { pt: "Permitir", fr: "Permettre", en: "Allow", group: "ir" },

            // IRRÉGULIERS MAJEURS
            { pt: "Ser", fr: "Être (permanent)", en: "To be", irr: true,
                "Presente": ["sou", "és", "é", "somos", "são", "são"],
                "Pretérito Perfeito": ["fui", "foste", "foi", "fomos", "foram", "foram"],
                "Pretérito Imperfeito": ["era", "eras", "era", "éramos", "eram", "eram"]
            },
            { pt: "Estar", fr: "Être (temporaire)", en: "To be", irr: true,
                "Presente": ["estou", "estás", "está", "estamos", "estão", "estão"],
                "Pretérito Perfeito": ["estive", "estiveste", "esteve", "estivemos", "estiveram", "estiveram"],
                "Pretérito Imperfeito": ["estava", "estavas", "estava", "estávamos", "estavam", "estavam"]
            },
            { pt: "Ter", fr: "Avoir", en: "To have", irr: true,
                "Presente": ["tenho", "tens", "tem", "temos", "têm", "têm"],
                "Pretérito Perfeito": ["tive", "tiveste", "teve", "tivemos", "tiveram", "tiveram"],
                "Pretérito Imperfeito": ["tinha", "tinhas", "tinha", "tínhamos", "tinham", "tinham"]
            },
            { pt: "Ir", fr: "Aller", en: "To go", irr: true,
                "Presente": ["vou", "vais", "vai", "vamos", "vão", "vão"],
                "Pretérito Perfeito": ["fui", "foste", "foi", "fomos", "foram", "foram"],
                "Pretérito Imperfeito": ["ia", "ias", "ia", "íamos", "iam", "iam"]
            },
            { pt: "Fazer", fr: "Faire", en: "To do", irr: true,
                "Presente": ["faço", "fazes", "faz", "fazemos", "fazem", "fazem"],
                "Pretérito Perfeito": ["fiz", "fizeste", "fez", "fizemos", "fizeram", "fizeram"],
                "Pretérito Imperfeito": ["fazia", "fazias", "fazia", "fazíamos", "faziam", "faziam"]
            },
            { pt: "Poder", fr: "Pouvoir", en: "Can", irr: true,
                "Presente": ["posso", "podes", "pode", "podemos", "podem", "podem"],
                "Pretérito Perfeito": ["pude", "pudeste", "pôde", "pudemos", "puderam", "puderam"]
            },
            { pt: "Dizer", fr: "Dire", en: "To say", irr: true,
                "Presente": ["digo", "dizes", "diz", "dizemos", "dizem", "dizem"],
                "Pretérito Perfeito": ["disse", "disreste", "disse", "dissemos", "disseram", "disseram"]
            },
            { pt: "Querer", fr: "Vouloir", en: "Want", irr: true,
                "Presente": ["quero", "queres", "quer", "queremos", "querem", "querem"],
                "Pretérito Perfeito": ["quis", "quiseste", "quis", "quisemos", "quiseram", "quiseram"]
            },
            { pt: "Ver", fr: "Voir", en: "See", irr: true,
                "Presente": ["vejo", "vês", "vê", "vemos", "veem", "veem"],
                "Pretérito Perfeito": ["vi", "viste", "viu", "vimos", "viram", "viram"]
            },
            { pt: "Saber", fr: "Savoir", en: "Know", irr: true,
                "Presente": ["sei", "sabes", "sabe", "sabemos", "sabem", "sabem"],
                "Pretérito Perfeito": ["soube", "soubeste", "soube", "soubemos", "souberam", "souberam"]
            }
        ]
    };

    let userData = JSON.parse(localStorage.getItem('pt_master_v1')) || { streak: 0, verbs: {}, uiLang: 'fr' };
    let state = { currentQ: null, isWaiting: false };

    function changeUILanguage() {
        userData.uiLang = document.getElementById('ui-lang-select').value;
        save(); updateUI();
    }

    function translateStaticInterface() {
        const s = uiStrings[userData.uiLang];
        document.getElementById('btn-start').innerText = s.start;
        document.getElementById('stats-title').innerText = s.topErrors;
        document.getElementById('lbl-ui').innerText = s.lblUi;
        document.getElementById('lbl-tense').innerText = s.lblTense;
        document.getElementById('lbl-irr').innerText = s.lblIrr;
        document.getElementById('th-verb').innerText = s.thVerb;
        document.getElementById('th-err').innerText = s.thErr;
        document.getElementById('user-input').placeholder = s.placeholder;
        renderStats();
    }

    function updateUI() {
        document.getElementById('streak-setup').innerText = userData.streak;
        document.getElementById('streak-quiz').innerText = userData.streak;
        document.getElementById('ui-lang-select').value = userData.uiLang;
        translateStaticInterface();
    }

    function renderStats() {
        const body = document.getElementById('stats-body');
        body.innerHTML = '';
        const sorted = Object.entries(userData.verbs)
            .filter(([_, d]) => d.err > 0)
            .sort((a,b) => b[1].err - a[1].err).slice(0, 10);
        sorted.forEach(([n, d]) => {
            body.innerHTML += `<tr><td>${n}</td><td style="color:var(--err); font-weight:bold">${d.err}</td></tr>`;
        });
    }

    function startQuiz() {
        document.getElementById('screen-setup').classList.remove('active');
        document.getElementById('screen-quiz').classList.add('active');
        next();
    }

    function next() {
        state.isWaiting = false;
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('feedback').innerText = '';
        const input = document.getElementById('user-input');
        input.value = ''; input.style.borderColor = "#334155";
        
        const includeIrr = document.getElementById('irr-toggle').checked;
        let pool = db.verbs.filter(v => includeIrr ? true : !v.irr);
        
        const verb = pool[Math.floor(Math.random() * pool.length)];
        const tense = document.getElementById('time-select').value;
        const pIdx = Math.floor(Math.random() * 6);
        const conjIdx = (pIdx === 4) ? 5 : pIdx; // Voces (4) = Eles (5)
        
        let answer = "";
        let rule = "";

        if (verb.irr && verb[tense]) {
            answer = verb[tense][conjIdx];
            rule = "Verbo irregular";
        } else {
            const root = verb.pt.slice(0, -2).toLowerCase();
            if (tense === "Futuro") {
                const term = endings["Futuro"]["all"][conjIdx];
                answer = verb.pt.toLowerCase() + term;
                rule = `${verb.pt.toLowerCase()} + ${term}`;
            } else {
                const term = endings[tense][verb.group][conjIdx];
                answer = root + term;
                rule = `${root} + ${term}`;
            }
        }

        state.currentQ = { verb: verb.pt, tense: tense, person: db.people[pIdx], answer: answer.toLowerCase(), trans: verb[userData.uiLang], rule: rule };
        document.getElementById('display-verb').innerText = state.currentQ.verb;
        document.getElementById('display-trans').innerText = state.currentQ.trans;
        document.getElementById('display-tense').innerText = state.currentQ.tense;
        document.getElementById('display-prompt').innerText = state.currentQ.person + " ...";
    }

    document.getElementById('user-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const val = e.target.value.trim().toLowerCase();
            const correct = state.currentQ.answer;
            if(!userData.verbs[state.currentQ.verb]) userData.verbs[state.currentQ.verb] = {err:0};

            if (val === correct) {
                if (!state.isWaiting) userData.streak++;
                document.getElementById('feedback').innerHTML = `<span style="color:var(--ok)">${uiStrings[userData.uiLang].correct}</span>`;
                save(); updateUI(); setTimeout(next, 800);
            } else {
                state.isWaiting = true;
                userData.verbs[state.currentQ.verb].err++; userData.streak = 0;
                document.getElementById('feedback').innerHTML = `<span style="color:var(--err)">${uiStrings[userData.uiLang].incorrect}</span>`;
                document.getElementById('explanation').innerHTML = `<div class="explanation-box">👉 <b>${state.currentQ.answer}</b><br><small>${state.currentQ.rule}</small></div>`;
                document.getElementById('explanation').style.display = 'block';
                e.target.style.borderColor = "var(--err)";
                save(); updateUI();
            }
        }
    });

    function save() { localStorage.setItem('pt_master_v1', JSON.stringify(userData)); }
    updateUI();
</script>
<a href="index.html" style="position: fixed; top: 10px; left: 10px; background: #1e293b; color: white; text-decoration: none; padding: 8px 15px; border-radius: 10px; font-size: 14px; border: 1px solid #334155; z-index: 1000;">
    🏠 Accueil
</a>
</body>
</html>
